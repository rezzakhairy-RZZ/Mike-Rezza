<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miker's Rezza — Konverter Unit Malaysia</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:       #050810;
    --panel:    #090e1c;
    --panel2:   #070c18;
    --cyan:     #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-glow:rgba(0,245,255,0.35);
    --magenta:  #ff0080;
    --mag-dim:  rgba(255,0,128,0.15);
    --yellow:   #ffe600;
    --green:    #39ff14;
    --green-dim:rgba(57,255,20,0.15);
    --border:   #1a3040;
    --text:     #c8e8f0;
    --dim:      #4a7a8a;
    --dimmer:   #2a4a5a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Atmospheric layers ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.012) 2px, rgba(0,245,255,0.012) 4px);
    pointer-events: none; z-index: 9998;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none; z-index: 0;
  }

  /* ── Layout ── */
  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 32px 20px 28px;
    position: relative;
    margin-bottom: 28px;
  }
  .header-frame {
    position: absolute; inset: 0;
    border: 1px solid var(--border);
    pointer-events: none;
  }
  .header-frame::before {
    content: '';
    position: absolute; top: -1px; left: 60px; right: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 12px var(--cyan);
  }
  .header-frame::after {
    content: '';
    position: absolute; bottom: -1px; left: 60px; right: 60px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--magenta), transparent);
    box-shadow: 0 0 12px var(--magenta);
  }

  /* corner brackets */
  .hc { position: absolute; width: 24px; height: 24px; border-color: var(--cyan); border-style: solid; }
  .hc-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .hc-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .hc-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .hc-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .sys-tag {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--magenta);
    border: 1px solid var(--magenta);
    padding: 3px 14px;
    letter-spacing: 4px;
    margin-bottom: 14px;
    text-shadow: 0 0 8px var(--magenta);
    box-shadow: 0 0 12px rgba(255,0,128,0.2);
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(26px, 5vw, 48px);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.7), 0 0 60px rgba(0,245,255,0.25);
    letter-spacing: 5px;
    line-height: 1.1;
    animation: flicker 9s infinite;
  }

  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--magenta);
    letter-spacing: 3px;
    margin-top: 10px;
    text-shadow: 0 0 10px rgba(255,0,128,0.5);
  }

  @keyframes flicker {
    0%,93%,100%{opacity:1}
    94%{opacity:.75}
    95%{opacity:1}
    97%{opacity:.85}
    98%{opacity:1}
  }

  /* ── Category Tabs ── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
    gap: 6px;
    margin-bottom: 22px;
  }

  .cat-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 12px 8px 10px;
    cursor: pointer;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    text-align: center;
  }
  .cat-btn .ci { font-size: 20px; display: block; margin-bottom: 6px; }
  .cat-btn:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(0,245,255,0.04); }
  .cat-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--cyan-dim);
    text-shadow: 0 0 8px rgba(0,245,255,0.8);
    box-shadow: 0 0 20px var(--cyan-dim), inset 0 0 20px rgba(0,245,255,0.05);
  }
  .cat-btn.active::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
  }

  /* ── Main Panel ── */
  .main-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
    margin-bottom: 20px;
  }
  .main-panel::before {
    content: '';
    position: absolute; top: -1px; left: 30px; right: 30px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan) 40%, var(--magenta) 60%, transparent);
    box-shadow: 0 0 15px var(--cyan-dim);
  }

  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--magenta);
    letter-spacing: 4px;
    margin-bottom: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-tag::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--magenta), transparent);
    opacity: 0.3;
  }

  /* ── Input area ── */
  .conv-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: start;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .conv-grid { grid-template-columns: 1fr; }
    .swap-col { display: flex; justify-content: center; transform: rotate(90deg); }
  }

  .conv-side label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .cp-input {
    width: 100%;
    background: #020508;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    padding: 12px 16px;
    outline: none;
    transition: all .2s;
    text-shadow: 0 0 12px rgba(0,245,255,0.4);
    -moz-appearance: textfield;
  }
  .cp-input::-webkit-outer-spin-button,
  .cp-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .cp-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 25px var(--cyan-dim), inset 0 0 15px rgba(0,245,255,0.03);
  }
  .cp-input::placeholder { color: var(--dimmer); }

  .cp-select {
    width: 100%;
    background: #020508;
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--magenta);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 36px 10px 14px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    transition: all .2s;
    margin-top: 10px;
  }
  .cp-select:focus { border-color: var(--magenta); box-shadow: 0 0 20px var(--mag-dim); }
  .sel-wrap { position: relative; }
  .sel-arrow {
    position: absolute; right: 12px; top: 50%; transform: translateY(-25%);
    color: var(--magenta); font-size: 10px; pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
  }

  /* swap button */
  .swap-col { display: flex; align-items: center; justify-content: center; padding-top: 50px; }
  .swap-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    width: 46px; height: 46px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .swap-btn:hover {
    background: var(--cyan-dim);
    box-shadow: 0 0 20px var(--cyan-glow);
    text-shadow: 0 0 10px var(--cyan);
  }
  .swap-btn:active { transform: scale(0.93); }

  /* ── Result ── */
  .result-box {
    background: #020508;
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    padding: 18px 22px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .result-box::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--green-dim), transparent 60%);
    pointer-events: none;
  }
  .result-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .result-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(22px, 4vw, 36px);
    color: var(--green);
    text-shadow: 0 0 20px rgba(57,255,20,0.6);
    word-break: break-all;
    line-height: 1.2;
    transition: all .15s;
  }
  .result-unit-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    color: var(--dim);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ── Quick Refs ── */
  .refs-section { margin-top: 4px; }
  .refs-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--yellow);
    letter-spacing: 3px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
  }
  .refs-tag::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(255,230,0,0.3), transparent);
  }

  .ref-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 8px;
  }

  .ref-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    transition: all .15s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .ref-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,230,0,0.3), transparent);
  }
  .ref-card:hover { border-color: var(--yellow); background: rgba(255,230,0,0.04); }
  .ref-from {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-bottom: 4px;
  }
  .ref-to {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--yellow);
    text-shadow: 0 0 8px rgba(255,230,0,0.4);
  }
  .my-tag {
    display: inline-block;
    background: var(--mag-dim);
    border: 1px solid rgba(255,0,128,0.35);
    color: var(--magenta);
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px;
    padding: 1px 5px;
    letter-spacing: 1px;
    margin-left: 6px;
    vertical-align: middle;
    text-shadow: 0 0 6px rgba(255,0,128,0.5);
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    padding: 10px 0 0;
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    flex-wrap: wrap;
    gap: 6px;
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    margin-right: 6px;
    animation: pulse 2.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 20px 0 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dimmer);
    letter-spacing: 2px;
    border-top: 1px solid var(--border);
  }
  .footer span { color: var(--magenta); }
</style>
</head>

// ── State ──────────────────────────────────────────────
let activeCat = 'panjang';

// ── Conversion Logic ──────────────────────────────────
function convertTemp(val, from, to) {
  let c;
  if (from === 'celsius')    c = val;
  else if (from === 'fahrenheit') c = (val - 32) * 5/9;
  else                       c = val - 273.15;

  if (to === 'celsius')    return c;
  if (to === 'fahrenheit') return c * 9/5 + 32;
  return c + 273.15;
}

function convert(val, cat, from, to) {
  const data = UNITS[cat];
  if (data.special) return convertTemp(val, from, to);
  const fu = data.list.find(u => u.id === from);
  const tu = data.list.find(u => u.id === to);
  if (!fu || !tu) return null;
  return val * fu.f / tu.f;
}

function fmt(n) {
  if (n === null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e12 || (abs < 1e-6 && abs !== 0)) return n.toExponential(4);
  if (Number.isInteger(n) && abs < 1e10) return n.toLocaleString('ms-MY');
  const s = parseFloat(n.toPrecision(8));
  return s.toLocaleString('ms-MY', { maximumFractionDigits: 8 });
}

// ── DOM Builders ──────────────────────────────────────
function buildCats() {
  const g = document.getElementById('catGrid');
  g.innerHTML = CATS.map(c => `
    <button class="cat-btn${c.id === activeCat ? ' active' : ''}" onclick="setCat('${c.id}')">
      <span class="ci">${c.icon}</span>${c.label}
    </button>`).join('');
}

function buildUnits() {
  const data = UNITS[activeCat];
  const fs = document.getElementById('fromUnit');
  const ts = document.getElementById('toUnit');
  const fv = fs.value, tv = ts.value;

  const mkOpts = () => data.list.map(u =>
    `<option value="${u.id}">${u.label}${u.my ? '' : ''}</option>`
  ).join('');

  fs.innerHTML = mkOpts();
  ts.innerHTML = mkOpts();

  if (data.list.find(u => u.id === fv)) fs.value = fv;
  else fs.value = data.list[0].id;

  if (data.list.find(u => u.id === tv)) ts.value = tv;
  else ts.value = data.list[1] ? data.list[1].id : data.list[0].id;
}

function buildRefs() {
  const refs = UNITS[activeCat].refs || [];
  document.getElementById('refGrid').innerHTML = refs.map(r => `
    <div class="ref-card">
      <div class="ref-from">${r.from}</div>
      <div class="ref-to">= ${r.to}</div>
    </div>`).join('');
}

function doConvert() {
  const val  = parseFloat(document.getElementById('inputVal').value);
  const from = document.getElementById('fromUnit').value;
  const to   = document.getElementById('toUnit').value;

  if (isNaN(val)) {
    document.getElementById('resultVal').textContent = '—';
    document.getElementById('resultUnitLabel').textContent = '';
    return;
  }

  const res = convert(val, activeCat, from, to);
  const tu  = UNITS[activeCat].list.find(u => u.id === to);

  document.getElementById('resultVal').textContent = fmt(res);
  document.getElementById('resultUnitLabel').textContent = tu ? tu.label : '';
  document.getElementById('statusInfo').textContent =
    (from + ' → ' + to).toUpperCase();
}

function setCat(id) {
  activeCat = id;
  buildCats();
  buildUnits();
  buildRefs();
  doConvert();
}

// ── Events ────────────────────────────────────────────
document.getElementById('swapBtn').addEventListener('click', () => {
  const f = document.getElementById('fromUnit');
  const t = document.getElementById('toUnit');
  const tmp = f.value; f.value = t.value; t.value = tmp;
  doConvert();
});

document.getElementById('inputVal').addEventListener('input', doConvert);
document.getElementById('fromUnit').addEventListener('change', doConvert);
document.getElementById('toUnit').addEventListener('change', doConvert);

// ── Clock ─────────────────────────────────────────────
function tick() {
  const now = new Date();
  document.getElementById('statusTime').textContent =
    now.toLocaleTimeString('ms-MY', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
tick(); setInterval(tick, 1000);

// ── Init ──────────────────────────────────────────────
buildCats(); buildUnits(); buildRefs(); doConvert();
</script>
